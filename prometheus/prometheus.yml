global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: perforce
    # The exporter runs inside the compose network; service name resolves
    # automatically. If you choose to run the exporter on the host
    # instead, swap this for "host.docker.internal:9117".
    static_configs:
      - targets: ["exporter:9117"]
